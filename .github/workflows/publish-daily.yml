name: Publish Daily Report

on:
  repository_dispatch:
    types: [publish-daily]
  workflow_dispatch:
    inputs:
      date:
        description: 'Report date (YYYY-MM-DD)'
        required: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate daily report
        run: |
          DATE="${{ github.event.inputs.date || github.event.client_payload.date }}"
          if [ -z "$DATE" ]; then
            DATE=$(TZ=Asia/Shanghai date +%Y-%m-%d)
          fi
          FILE="daily/${DATE}.md"
          if [ ! -f "$FILE" ]; then
            echo "::error::Report file $FILE not found"
            exit 1
          fi
          echo "DATE=$DATE" >> $GITHUB_ENV
          echo "FILE=$FILE" >> $GITHUB_ENV

      - name: Commit and push
        run: |
          git config user.name "AI Daily Bot"
          git config user.email "ai-daily-bot@users.noreply.github.com"
          git add daily/ sources/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "daily: ${DATE} report published"
            git push
          fi
